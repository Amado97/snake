<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Snake</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        img {
            width: 150px;
            height: 150px;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 36px;
            letter-spacing: 2px;
        }

        .scores-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .score-board {
            font-size: 18px;
            font-weight: bold;
            background-color: #34495e;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            text-align: center;
            min-width: 120px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-board span {
            display: block;
            font-size: 28px;
            color: #f1c40f;
            /* Color brillante para los números */
            margin-top: 5px;
        }

        #game-container {
            position: relative;
        }

        canvas {
            background-color: #1a252f;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 4px solid #34495e;
            border-radius: 8px;
        }

        .game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(44, 62, 80, 0.95);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            border: 2px solid #e74c3c;
        }

        .game-over h2 {
            margin-top: 0;
            color: #e74c3c;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .game-over p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #2ecc71;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <h1>SNAKE</h1>
    <img src="dragonRojo.png" alt="Snake">
    <div class="scores-container">
        <div class="score-board">
            Puntuación <span id="score">0</span>
        </div>
        <div class="score-board">
            Récord <span id="highScore">0</span>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="gameOver" class="game-over">
            <h2>¡Juego Terminado!</h2>
            <p>Tu puntuación final: <strong id="finalScore">0</strong></p>
            <button onclick="resetGame()">Jugar de Nuevo</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("highScore");
        const gameOverScreen = document.getElementById("gameOver");
        const finalScoreElement = document.getElementById("finalScore");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let dx = 1;
        let dy = 0;
        let foodX;
        let foodY;
        let score = 0;

        // Obtenemos el registro máximo del guardado local del navegador, o 0 si no existe
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        let gameLoopTimeout;
        let isGameOver = false;
        let changingDirection = false;

        highScoreElement.textContent = highScore;

        function init() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.textContent = score;
            isGameOver = false;
            changingDirection = false;
            gameOverScreen.style.display = "none";

            placeFood();

            if (gameLoopTimeout) clearTimeout(gameLoopTimeout);
            gameLoop();
        }

        function gameLoop() {
            if (isGameOver) return;
            changingDirection = false;

            gameLoopTimeout = setTimeout(() => {
                clearCanvas();
                drawFood();
                moveSnake();
                checkGameOver();

                if (!isGameOver) {
                    drawSnake();
                    gameLoop();
                }
            }, 100);
        }

        function clearCanvas() {
            ctx.fillStyle = "#1a252f";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? "#2ecc71" : "#27ae60";
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            if (head.x === foodX && head.y === foodY) {
                score += 10;
                scoreElement.textContent = score;

                // Actualizamos el registro máximo si se supera
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem("snakeHighScore", highScore);
                    highScoreElement.textContent = highScore;
                }

                placeFood();
            } else {
                snake.pop();
            }
        }

        function drawFood() {
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(foodX * gridSize, foodY * gridSize, gridSize - 2, gridSize - 2);
        }

        function placeFood() {
            foodX = Math.floor(Math.random() * tileCount);
            foodY = Math.floor(Math.random() * tileCount);

            const isOnSnake = snake.some(segment => segment.x === foodX && segment.y === foodY);
            if (isOnSnake) {
                placeFood();
            }
        }

        function checkGameOver() {
            const head = snake[0];

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                handleGameOver();
            }

            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    handleGameOver();
                }
            }
        }

        function handleGameOver() {
            isGameOver = true;
            finalScoreElement.textContent = score;
            gameOverScreen.style.display = "block";

            snake.forEach((segment) => {
                ctx.fillStyle = "#c0392b";
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function resetGame() {
            init();
        }

        window.addEventListener("keydown", e => {
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"].includes(e.code)) {
                e.preventDefault();
            }
        }, { passive: false });

        document.addEventListener("keydown", changeDirection);

        function changeDirection(event) {
            if (changingDirection) return;

            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;
            const UP_KEY = 38;
            const DOWN_KEY = 40;

            const keyPressed = event.keyCode;

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (keyPressed === LEFT_KEY && !goingRight) {
                dx = -1;
                dy = 0;
                changingDirection = true;
            }
            if (keyPressed === UP_KEY && !goingDown) {
                dx = 0;
                dy = -1;
                changingDirection = true;
            }
            if (keyPressed === RIGHT_KEY && !goingLeft) {
                dx = 1;
                dy = 0;
                changingDirection = true;
            }
            if (keyPressed === DOWN_KEY && !goingUp) {
                dx = 0;
                dy = 1;
                changingDirection = true;
            }
        }

        init();
    </script>
</body>

</html>
